<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Colors -->
  <!-- Blue: #1F4E79 -->
  <!-- Red: #D62828 -->
  <!-- Grey: #8A8A8A -->

  <!-- Stylized "A" -->
  <polygon points="80,220 150,80 200,80 130,220" fill="#1F4E79"/>
  <polygon points="145,220 195,120 225,120 175,220" fill="#D62828"/>

  <!-- ERP tag -->
  <rect x="80" y="240" width="110" height="40" rx="6" fill="#8A8A8A"/>
  <text x="135" y="267" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">ERP</text>

  <!-- SFTP circle flow -->
  <circle cx="320" cy="170" r="90" fill="none" stroke="#1F4E79" stroke-width="12"
          stroke-dasharray="450 150"/>
  <path d="M405 250 L385 230 L425 230 Z" fill="#D62828"/>

  <!-- Folder -->
  <rect x="260" y="150" width="120" height="70" rx="10" fill="#1F4E79"/>
  <polygon points="260,150 300,150 310,135 260,135" fill="#1F4E79"/>

  <!-- Arrow up -->
  <polygon points="310,120 330,140 290,140" fill="#1F4E79"/>

  <!-- SFTP text -->
  <text x="320" y="195" font-family="Arial, sans-serif" font-size="22" fill="white" text-anchor="middle">SFTP</text>

  <!-- Bottom text -->
  <text x="256" y="330" font-family="Arial, sans-serif" font-size="28" fill="#1F4E79" text-anchor="middle">
    AMTECH <tspan fill="#D62828">ALTERNATE</tspan>
  </text>

  <text x="256" y="370" font-family="Arial, sans-serif" font-size="18" fill="#8A8A8A" text-anchor="middle">
    SFTP
  </text>

  <!-- Decorative lines -->
  <line x1="100" y1="360" x2="190" y2="360" stroke="#8A8A8A" stroke-width="3"/>
  <line x1="320" y1="360" x2="410" y2="360" stroke="#8A8A8A" stroke-width="3"/>

</svg>
